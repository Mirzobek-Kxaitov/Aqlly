<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Aqlly — Yaxshiroq darslar, tezroq</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Caveat:wght@400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  /* Theme variables, switched via [data-theme] */
  :root,
  [data-theme="amber"] {
    --accent: #F59E0B;
    --accent-dark: #B45309;
    --accent-soft: #FEF3C7;
    --page-bg: #FFF8EC;
  }
  [data-theme="green"] {
    --accent: #10B981;
    --accent-dark: #047857;
    --accent-soft: #D1FAE5;
    --page-bg: #F0FDF4;
  }
  [data-theme="coral"] {
    --accent: #F43F5E;
    --accent-dark: #BE123C;
    --accent-soft: #FFE4E6;
    --page-bg: #FFF1F2;
  }
  [data-theme="violet"] {
    --accent: #8B5CF6;
    --accent-dark: #6D28D9;
    --accent-soft: #EDE9FE;
    --page-bg: #F5F3FF;
  }
  [data-theme="sky"] {
    --accent: #0EA5E9;
    --accent-dark: #0369A1;
    --accent-soft: #E0F2FE;
    --page-bg: #F0F9FF;
  }

  :root {
    --ink: #1F2937;
    --muted: #6B7280;
    --border: #E5E7EB;
  }

  html, body {
    margin: 0; padding: 0;
    background: var(--page-bg);
    transition: background 0.25s ease;
    font-family: 'Nunito', system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  button:hover { filter: brightness(1.05); }
  a:hover { color: var(--accent-dark) !important; }
  @media (max-width: 1100px) {
    .nav-tagline { display: none; }
  }
  @media (max-width: 900px) {
    .hero-grid { grid-template-columns: 1fr !important; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="illustrations.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
  const { useEffect } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "green",
    "showStats": true,
    "stats": "284,596"
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

    useEffect(() => {
      document.documentElement.setAttribute("data-theme", t.theme);
    }, [t.theme]);

    return (
      <>
        <TopNav />
        <main style={{
          maxWidth: 1280, margin: "0 auto",
          padding: "8px 32px 64px",
          display: "flex", flexDirection: "column", gap: 24,
        }}>
          <Hero stats={t.stats} />
          <EasySteps />
          <Features />
          <Templates />
          <Footer />
        </main>

        <TweaksPanel title="Tweaks">
          <TweakSection title="Rang palitrasi">
            <TweakSelect
              label="Tema"
              value={t.theme}
              onChange={(v) => setTweak("theme", v)}
              options={[
                { value: "amber", label: "Amber (issiq sariq)" },
                { value: "green", label: "Yashil (toza)" },
                { value: "coral", label: "Marjon (issiq)" },
                { value: "violet", label: "Siyohrang" },
                { value: "sky", label: "Osmon ko'k" },
              ]}
            />
            <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
              {[
                { id: "amber", c: "#F59E0B" },
                { id: "green", c: "#10B981" },
                { id: "coral", c: "#F43F5E" },
                { id: "violet", c: "#8B5CF6" },
                { id: "sky", c: "#0EA5E9" },
              ].map((s) => (
                <button key={s.id} onClick={() => setTweak("theme", s.id)} style={{
                  width: 36, height: 36, borderRadius: 8, border: t.theme === s.id ? "2.5px solid #111" : "2px solid #ddd",
                  background: s.c, cursor: "pointer", padding: 0,
                }} aria-label={s.id}/>
              ))}
            </div>
          </TweakSection>
          <TweakSection title="Hero statistikasi">
            <TweakText
              label="Resurslar soni"
              value={t.stats}
              onChange={(v) => setTweak("stats", v)}
            />
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
